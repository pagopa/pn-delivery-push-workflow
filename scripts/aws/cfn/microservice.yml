AWSTemplateFormatVersion: 2010-09-09
Description: 'Example microservice deploy'

Parameters:
  ProjectName:
    Type: String
    Description: 'Usually pn can be pnXYZ where XYZ are the feature number, useful to create
      experimental environments without crash official development environment'
  
  AlarmSNSTopicArn:
    Type: String
    Description: ARN of alarm topic
  
  WebApiDnsName:
    Type: String
    Description: 'The DNS name used for WEB rest API.'
  
  CorsAllowedDomains:
    Type: String
    Description: 'Comma separated list of domains allowed to make cross origin request'
  
  ContainerImageUri:
    Type: String
    Description: 'Exact container image URI with full repository and image digest'
  
  MicroserviceNumber:
    Type: Number
    Description: 'Disambiguation useful for load balancer rules'
  
  TemplateBucketBaseUrl:
    Type: String
    Description: 'The S3 bucket from which to fetch the templates used by this stack.'
  
  ECSClusterName:
    Type: String
    Description: 'The name of the ECS cluster where the microservice is going to be deployed'
  
  SubnetsIds:
    Type: String
    Description: 'subnets ids comma separated list. Where to deploy the microservice'
  
  VpcId:
    Type: String
    Description: 'VpcId where the microservice is going to be deployed'
  
  EcsDefaultSecurityGroup:
    Type: String
    Description: 'Default security group required by infrastructure'
  
  ApplicationLoadBalancerListenerArn:
    Type: String
    Description: 'Load balancer listener where HTTP endpoints is going to be registered'
  
  ApplicationLoadBalancerDomain:
    Type: String
    Description: 'Base URL of the load balancer where the service is going to be reachable'
  
  ApplicationLoadBalancerMetricsDimensionName:
    Type: String
    Default: ''
    Description: 'Application load balancer dimension name'
  
  AlbSecurityGroup:
    Type: String
    Description: 'Application load balancer security group'
  
  NetworkLoadBalancerLink:
    Type: String
    Description: 'network load balancer link for API-GW'
  
  LogsKinesisSourceStreamArn:
    Type: String
    Description: 'Kinesis stream that receive logs'
  
  Version:
    Type: String
    Description: 'keep track of used projects commitIds'
  
  # Instance parameters
  # 256 (.25 vCPU) - Available memory values: 0.5GB, 1GB, 2GB
  # 512 (.5 vCPU) - Available memory values: 1GB, 2GB, 3GB, 4GB
  # 1024 (1 vCPU) - Available memory values: 2GB, 3GB, 4GB, 5GB, 6GB, 7GB, 8GB
  # 2048 (2 vCPU) - Available memory values: Between 4GB and 16GB in 1GB increments
  # 4096 (4 vCPU) - Available memory values: Between 8GB and 30GB in 1GB increments
  CpuValueWorkflow:
    Type: Number
    Default: 1024
    Description: Fargate virtual CPU quantity 1024 equals one vCPU (Workflow task)
  
  # 0.5GB, 1GB, 2GB - Available cpu values: 256 (.25 vCPU)
  # 1GB, 2GB, 3GB, 4GB - Available cpu values: 512 (.5 vCPU)
  # 2GB, 3GB, 4GB, 5GB, 6GB, 7GB, 8GB - Available cpu values: 1024 (1 vCPU)
  # Between 4GB and 16GB in 1GB increments - Available cpu values: 2048 (2 vCPU)
  # Between 8GB and 30GB in 1GB increments - Available cpu values: 4096 (4 vCPU)
  MemoryAmountWorkflow:
    Type: String
    Default: 2GB
    Description: memory amount reserved to the task pod (Workflow task)
    AllowedValues: [ 2GB, 4GB, 6GB, 8GB ]
  
  HealthCheckTimeout:
    Description: health check timeout seconds
    Type: Number
    Default: 5
  
  # Heath Check parameters
  HealthCheckInterval:
    Description: Seconds between two health check
    Type: Number
    Default: 60
  
  HealthyThresholdCount:
    Description: |
      The number of consecutive health checks successes required before considering
      an unhealthy target healthy.
    Type: Number
    Default: 5
  
  UnhealthyThresholdCount:
    Description: |
      The number of consecutive health check failures required before considering a target unhealthy.
    Type: Number
    Default: 2
  
  AutoscalingThresholdWorkflow:
    Default: 70
    Type: String
  
  # Autoscaling parameters
  AutoscalingCheckPeriod:
    Default: 60
    Type: Number
    Description: minimum autoscaling number of tasks
  
  MinTasksNumberWorkflow:
    Default: 1
    Type: Number
    Description: minimum autoscaling number of tasks (Workflow task)
  
  MaxTasksNumberWorkflow:
    Default: 6
    Type: Number
    Description: maximum autoscaling number of tasks (Workflow task)
  
  AutoscalingDataPointWorkflowN:
    Default: 1
    Type: Number
    Description: activate when N datapoint on M (Workflow task)
  
  AutoscalingDataPointWorkflowM:
    Default: 1
    Type: Number
    Description: activate when N datapoint on M (Workflow task)
  
  ApplicativeEnvFileChecksum:
    Type: String
    Default: ''
    Description: 'Applicative environment variable file checksum'
    
  # Log group parameters
  EcsWorkflowLogGroup:
    Type: String
    Description: 'Ecs log group name (Workflow task)'
  
  LogAlarmStrategy:
    Type: String
    Default: 'FATAL'

  # Logging parameters
  WireTapLogActivation:
    Type: String
    Default: false
    Description: Activation of wire logs
    AllowedValues:
      - true
      - false

  PnCronAnalyzer:
    Type: String
    Default: '-'
    Description: Cron for which you send the metric to CloudWatch

  # EFS parameters
  FargateEFSFileSystemID:
    Type: String
    Description: "EFS Filesystem"

  MountEfs:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"

  # --- Base URLs ---
  ExternalChannelBaseUrl:
    Type: String
    Description: 'External channel base url'
  
  SandboxSafeStorageBaseUrl:
    Type: String
    Description: 'Safe storage base url'
  
  # --- DynamoDB Tables ---
  PaperNotificationFailedDynamoTableName:
    Type: String
    Description: 'Name of dynamodb table containing unreacheble notifications recipients'
  
  PaperNotificationFailedDynamoTableArn:
    Type: String
    Description: 'ARN of dynamodb table containing unreacheble notifications recipients'
  
  DocumentCreationRequestTableName:
    Type: String
    Description: 'Name of dynamodb table containing unreacheble notifications recipients'
  
  DocumentCreationRequestTableArn:
    Type: String
    Description: 'ARN of dynamodb table containing unreacheble notifications recipients'
    
  # --- SQS Queues ---
  DeliveryPushInputsQueueName:
    Type: String
    Description: 'Queue to pull for inputs event'
    
  DeliveryPushInputsQueueARN:
    Type: String
    Description: 'Queue to pull for inputs event'
    
  DeliveryPushInputsQueueAlarmARN:
    Type: String
    Description: 'pn-delivery-push input queue alarm ARN'
    
  DeliveryPushInputsQueueAgeAlarmARN:
    Type: String
    Description: 'pn-delivery-push input queue age alarm ARN'
    
  ExternalChannelsOutputsQueueName:
    Type: String
    Description: 'Pull external-channel messages from this Queue'
    
  ExternalChannelsOutputsQueueARN:
    Type: String
    Description: 'Pull external-channel messages from this Queue'
    
  ScheduledActionsQueueName:
    Type: String
    Description: 'Send and pull ready-to-do actions th this queue'
    
  ScheduledActionsQueueARN:
    Type: String
    Description: 'Send and pull ready-to-do actions th this queue'
    
  ScheduledActionsQueueAlarmARN:
    Type: String
    Description: delivery push actions done queue dlq alarm ARN
    
  ScheduledActionsQueueAgeAlarmARN:
    Type: String
    Description: delivery push actions done queue age alarm ARN
    
  NationalRegistries2DeliveryPushQueueName:
    Type: String
    Description: 'National Registries to delivery-push queue name'
    
  NationalRegistries2DeliveryPushQueueARN:
    Type: String
    Description: 'National Registries to delivery-push queue ARN'
    
  NationalRegistries2DeliveryPushQueueAlarmARN:
    Type: String
    Description: 'National Registries to delivery-push queue dlq alarm'
    
  NationalRegistries2DeliveryPushQueueAgeAlarmARN:
    Type: String
    Description: 'National Registries to delivery-push queue age alarm'
    
  DeliveryPushToExternalRegistriesQueueURL: # defined in pn-infra
    Type: String
    Description: 'delivery-push to external-registries queue URL'
    
  DeliveryPushToExternalRegistriesQueueARN: # defined in pn-infra
    Type: String
    Description: 'delivery-push to external-registries queue ARN'

Conditions:
    UseExternalChannelMock: !Equals [ !Ref ExternalChannelBaseUrl, "Mock" ]

Resources:
  DeliveryPushWorkflowServiceMicroservice:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/ecs-service.yaml"
      Parameters:
        MicroServiceUniqueName: !Sub '${ProjectName}-delivery-push-workflow-service'
        CpuValue: !Ref CpuValueWorkflow
        MemoryAmount: !Ref MemoryAmountWorkflow
        HealthCheckTimeout: !Ref HealthCheckTimeout
        HealthCheckInterval: !Ref HealthCheckInterval
        HealthyThresholdCount: !Ref HealthyThresholdCount
        UnhealthyThresholdCount: !Ref UnhealthyThresholdCount
        AutoscalingStrategy: CUSTOM
        AutoscalingThreshold: !Ref AutoscalingThresholdWorkflow
        AutoscalingCheckPeriod: !Ref AutoscalingCheckPeriod
        MinTasksNumber: !Ref MinTasksNumberWorkflow
        MaxTasksNumber: !Ref MaxTasksNumberWorkflow
        AutoscalingDataPointN: !Ref AutoscalingDataPointWorkflowN
        AutoscalingDataPointM: !Ref AutoscalingDataPointWorkflowM
        AlarmSNSTopicArn: !Ref AlarmSNSTopicArn
        EfsFilesystem: !Ref FargateEFSFileSystemID
        MountEfs: !Ref MountEfs
        WireTapLogActivation: !Ref WireTapLogActivation
        ContainerImageURI: !Sub '${ContainerImageUri}'
        ContainerEnvEntry1: !Sub 'AWS_REGIONCODE=${AWS::Region}'
        ContainerEnvEntry2: !Sub 'PN_DELIVERYPUSHWORKFLOW_TOPICS_NEWNOTIFICATIONS=${DeliveryPushInputsQueueName}'
        ContainerEnvEntry3: !Sub 'PN_DELIVERYPUSHWORKFLOW_TOPICS_NATIONALREGISTRIESEVENTS=${NationalRegistries2DeliveryPushQueueName}'
        ContainerEnvEntry4: !Sub 'PN_DELIVERYPUSHWORKFLOW_TOPICS_FROMEXTERNALCHANNEL=${ExternalChannelsOutputsQueueName}'
        ContainerEnvEntry5: !Sub 'PN_DELIVERYPUSHWORKFLOW_TOPICS_SCHEDULEDACTIONS=${ScheduledActionsQueueName}'
        ContainerEnvEntry6:
          Fn::If:
            - UseExternalChannelMock
            - !Sub 'PN_DELIVERYPUSHWORKFLOW_EXTERNALCHANNELBASEURL=http://${ApplicationLoadBalancerDomain}:8080'
            - !Sub 'PN_DELIVERYPUSHWORKFLOW_EXTERNALCHANNELBASEURL=${ExternalChannelBaseUrl}'
        ContainerEnvEntry7: !Sub 'PN_DELIVERYPUSHWORKFLOW_PAPERCHANNELBASEURL=http://${ApplicationLoadBalancerDomain}:8080'
        ContainerEnvEntry8: !Sub 'PN_DELIVERYPUSHWORKFLOW_USERATTRIBUTESBASEURL=http://${ApplicationLoadBalancerDomain}:8080'
        ContainerEnvEntry9: !Sub 'PN_DELIVERYPUSHWORKFLOW_SAFESTORAGEBASEURL=${SandboxSafeStorageBaseUrl}'
        ContainerEnvEntry10: !Sub 'PN_DELIVERYPUSHWORKFLOW_DELIVERYBASEURL=http://${ApplicationLoadBalancerDomain}:8080'
        ContainerEnvEntry11: !Sub 'PN_DELIVERYPUSHWORKFLOW_MANDATEBASEURL=http://${ApplicationLoadBalancerDomain}:8080'
        ContainerEnvEntry12: !Sub 'PN_DELIVERYPUSHWORKFLOW_EXTERNALREGISTRYBASEURL=http://${ApplicationLoadBalancerDomain}:8080'
        ContainerEnvEntry13: !Sub 'PN_DELIVERYPUSHWORKFLOW_TEMPLATESENGINEBASEURL=http://${ApplicationLoadBalancerDomain}:8080'
        ContainerEnvEntry14: !Sub 'PN_DELIVERYPUSHWORKFLOW_TIMELINECLIENTBASEURL=http://${ApplicationLoadBalancerDomain}:8080'
        ContainerEnvEntry15: !Sub 'PN_DELIVERYPUSHWORKFLOW_EMDINTEGRATIONBASEURL=http://${ApplicationLoadBalancerDomain}:8080'
        ContainerEnvEntry16: !Sub 'PN_DELIVERYPUSHWORKFLOW_ACTIONMANAGERBASEURL=http://${ApplicationLoadBalancerDomain}:8080'
        ContainerEnvEntry17: !Sub 'PN_DELIVERYPUSHWORKFLOW_NATIONALREGISTRIESBASEURL=http://${ApplicationLoadBalancerDomain}:8080'
        ContainerEnvEntry18: 'PN_DELIVERYPUSHWORKFLOW_DATAVAULTBASEURL=http://alb.confidential.pn.internal:8080'
        ContainerEnvEntry19: !Sub 'PN_DELIVERYPUSHWORKFLOW_DOCUMENTCREATIONREQUESTDAO_TABLENAME=${DocumentCreationRequestTableName}'
        ContainerEnvEntry20: !Sub 'PN_DELIVERYPUSHWORKFLOW_FAILEDNOTIFICATIONDAO_TABLENAME=${PaperNotificationFailedDynamoTableName}'
        ContainerEnvEntry21: !Sub 'PN_CRON_ANALYZER=${PnCronAnalyzer}'
        ContainerEnvEntry22: !Sub 'WIRE_TAP_LOG=${WireTapLogActivation}'
        ApplicativeEnvFileChecksum: !Ref ApplicativeEnvFileChecksum
        JavaToolOptions: '-Dreactor.netty.ioWorkerCount=50'
        MappedPaths: '/pn-delivery-push-workflow-service-not-available'
        ECSClusterName: !Ref ECSClusterName
        Subnets: !Join [ ',', !Ref SubnetsIds ]
        VpcId: !Ref VpcId
        EcsDefaultSecurityGroup: !Ref EcsDefaultSecurityGroup
        LoadBalancerListenerArn: !Ref ApplicationLoadBalancerListenerArn
        LoadBalancerRulePriority: !Ref MicroserviceNumber
        TaskRoleManagedPolicyArn: !Ref DeliveryPushWorkflowServiceMicroserviceTaskManagedPolicy
        AlbSecurityGroup: !Ref AlbSecurityGroup
        EcsLogGroup: !Ref EcsWorkflowLogGroup
  
  ## Dashboard
  DeliveryPushWorkflowServiceMicroserviceCloudWatchDashboard:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/microservice-cloudwatch-dashboard.yaml"
      Parameters:
        DashboardName: !Sub "${ProjectName}-delivery-push-workflow-service"
        DynamoDBTableNames: !Join
          - ','
          - - !Ref PaperNotificationFailedDynamoTableName
            - !Ref DocumentCreationRequestTableName
        AlarmArns: !Join
          - ','
          - - !GetAtt DeliveryPushWorkflowServiceMicroservice.Outputs.FatalLogsMetricAlarmArn
            - !Ref DeliveryPushInputsQueueAlarmARN
            - !Ref DeliveryPushInputsQueueAgeAlarmARN
            - !Ref ScheduledActionsQueueAlarmARN
            - !Ref ScheduledActionsQueueAgeAlarmARN
            - !Ref NationalRegistries2DeliveryPushQueueAlarmARN
            - !Ref NationalRegistries2DeliveryPushQueueAgeAlarmARN
        QueueArns: !Join
          - ','
          - - !Ref DeliveryPushInputsQueueARN
            - !Ref ExternalChannelsOutputsQueueARN
            - !Ref ScheduledActionsQueueARN
            - !Ref NationalRegistries2DeliveryPushQueueARN
        LogGroupsNames: !Join
          - ','
          - - !Sub '/aws/ecs/${ProjectName}-delivery-push-workflow'

  # Grant operational rights to PN-Delivery-Push-Workflow-Service microservice
  DeliveryPushWorkflowServiceMicroserviceTaskManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action:
              - sqs:ChangeMessageVisibility
              - sqs:ChangeMessageVisibilityBatch
              - sqs:DeleteMessage
              - sqs:DeleteMessageBatch
              - sqs:GetQueueAttributes
              - sqs:GetQueueUrl
              - sqs:ReceiveMessage
              - sqs:SendMessage
              - sqs:SendMessageBatch
            Resource:
              - !Ref DeliveryPushInputsQueueARN
              - !Ref ExternalChannelsOutputsQueueARN
              - !Ref ScheduledActionsQueueARN
              - !Ref NationalRegistries2DeliveryPushQueueARN
          - Effect: Allow
            Action:
              - 'ssm:GetParameter'
              - 'ssm:GetParameters'
            Resource:
              - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/radd-experimentation-zip-*'
          - Effect: Allow
            Action:
              - 'dynamodb:GetItem'
              - 'dynamodb:Query'
              - 'dynamodb:PutItem'
              - 'dynamodb:DeleteItem'
              - 'dynamodb:UpdateItem'
            Resource:
              - !Sub "${PaperNotificationFailedDynamoTableArn}"
              - !Sub "${DocumentCreationRequestTableArn}"
  
  #### Alarm for custom metric Autoscaling
  AlarmCustomAutoscalingWorkflow:
    Type: "AWS::CloudWatch::Alarm"
    Properties:
      AlarmName: !Sub "${ProjectName}-delivery-push-workflow-service-autoscaling-custom"
      AlarmDescription: "Trigger scaling based on custom metric"
      DatapointsToAlarm: !Ref AutoscalingDataPointWorkflowN
      ComparisonOperator: "GreaterThanOrEqualToThreshold"
      Metrics:
        - Id: m1
          MetricStat:
            Metric:
              Dimensions:
                - Name: QueueName
                  Value: !Ref "DeliveryPushInputsQueueName"
              Namespace: "AWS/SQS"
              MetricName: "ApproximateNumberOfMessagesVisible"
            Period: !Ref AutoscalingCheckPeriod
            Stat: Average
          ReturnData: False
        - Id: m2
          MetricStat:
            Metric:
              Dimensions:
                - Name: QueueName
                  Value: !Ref "ExternalChannelsOutputsQueueName"
              Namespace: "AWS/SQS"
              MetricName: "ApproximateNumberOfMessagesVisible"
            Period: !Ref AutoscalingCheckPeriod
            Stat: Average
          ReturnData: False
        - Id: m3
          MetricStat:
            Metric:
              Dimensions:
                - Name: QueueName
                  Value: !Ref "NationalRegistries2DeliveryPushQueueName"
              Namespace: "AWS/SQS"
              MetricName: "ApproximateNumberOfMessagesVisible"
            Period: !Ref AutoscalingCheckPeriod
            Stat: Average
          ReturnData: False
        - Id: m4
          MetricStat:
            Metric:
              Dimensions:
                - Name: QueueName
                  Value: !Ref "ScheduledActionsQueueName"
              Namespace: "AWS/SQS"
              MetricName: "ApproximateNumberOfMessagesVisible"
            Period: !Ref AutoscalingCheckPeriod
            Stat: Average
          ReturnData: False
        - Id: m5
          MetricStat:
            Metric:
              Dimensions:
                - Name: TargetGroup
                  Value: !GetAtt DeliveryPushWorkflowServiceMicroservice.Outputs.TargetGroupName
                - Name: LoadBalancer
                  Value: !Ref ApplicationLoadBalancerMetricsDimensionName
              Namespace: "AWS/ApplicationELB"
              MetricName: "HealthyHostCount"
            Period: !Ref AutoscalingCheckPeriod
            Stat: Average
          ReturnData: False
        - Id: code
          Expression: !Sub "IF(m5==0, 101, (100*(m1+m2+m3+m4)) / (${ConsumedQueueMessagePerMinuteWorkflow} * m5) )"
          Label: !Sub "${ProjectName}-delivery-push-workflow-service-queue-custom-metric"
          ReturnData: False
        - Id: e1
          Expression: "code"
          Label: !Sub "${ProjectName}-delivery-push-workflow-service-autoscale-custom-metric"
      
      EvaluationPeriods: !Ref AutoscalingDataPointWorkflowM
      Threshold: 60
      AlarmActions:
        - !GetAtt DeliveryPushWorkflowServiceMicroservice.Outputs.ScaleUpPolicy
      OKActions:
        - !GetAtt DeliveryPushWorkflowServiceMicroservice.Outputs.ScaleDownPolicy