AWSTemplateFormatVersion: '2010-09-09'
Description: Some storage with input and output

Parameters:
  ProjectName:
    Type: String
    Description: Nome dell'ambiente destinazione

  # Unused but required by CD pipeline
  MicroserviceNumber:
    Type: Number
    Description: An unique number that identify the microservice inside the ECS cluster.

  # Unused but required by CD pipeline
  TemplateBucketBaseUrl:
    Type: String
    Description: URL da cui caricare i frammenti di template di infrastruttura
  
  AlarmSNSTopicName:
    Type: String
    Description: 'Topic alarm'

  LogsKinesisSourceStreamArn:
    Type: String
    Description: 'Where to send Logs'
  
  LogRetention:
    Type: Number
    Default: 14
  
  AlarmSNSTopicArn:
    Type: String
  
  Version:
    Type: String
    Description: 'keep track of used projects commitIds'
  
Resources:

  PnDeliveryPushWorkflowLogGroup:
    Type: AWS::CloudFormation::Stack
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/log-group.yaml"
      Parameters:
        LogGroupName: !Sub '${ProjectName}-delivery-push-workflow-service'
        LogsKinesisSourceStreamArn: !Ref LogsKinesisSourceStreamArn
        LogGroupRetention: !Ref LogRetention

  NotificationCancellationActionInsertLambdaLogGroup:
    Type: AWS::CloudFormation::Stack
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/log-group.yaml"
      Parameters:
        LogGroupName: !Sub "${ProjectName}-notificationCancellationActionInsert-workflow"
        LogGroupRetention: !Ref LogRetention
        LogGroupPrefix: '/aws/lambda'

  PaperEventsCostUpdateLambdaLogGroup:
    Type: AWS::CloudFormation::Stack
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/log-group.yaml"
      Parameters:
        LogGroupName: !Sub "${ProjectName}-paperEventsCostUpdate-workflow"
        LogGroupRetention: !Ref LogRetention
        LogGroupPrefix: '/aws/lambda'

  # Internal queues
  AnalogToDeliveryPushQueue:
    Type: AWS::CloudFormation::Stack
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/sqs-queue.yaml"
      Parameters:
        QueueName: !Sub '${ProjectName}-analog_to_delivery_push'
        AlarmSNSTopicName: !Ref AlarmSNSTopicName
        DelaySeconds: 1
        VisibilityTimeout: 60

Outputs:
  # Lambda functions
  NotificationCancellationActionInsertLambdaName:
    Value: !Sub "${ProjectName}-notificationCancellationActionInsert-workflow"
  PaperEventsCostUpdateLambdaName:
    Value: !Sub "${ProjectName}-paperEventsCostUpdate-workflow"

  # AnalogToDeliveryPush
  AnalogToDeliveryPushQueueName:
    Value: !GetAtt AnalogToDeliveryPushQueue.Outputs.QueueName
    Description: AnalogToDeliveryPush queue name
  AnalogToDeliveryPushQueueURL:
    Value: !GetAtt AnalogToDeliveryPushQueue.Outputs.QueueURL
    Description: AnalogToDeliveryPush queue URL
  AnalogToDeliveryPushQueueARN:
    Value: !GetAtt AnalogToDeliveryPushQueue.Outputs.QueueARN
    Description: AnalogToDeliveryPush queue ARN


  # Log groups
  EcsWorkflowLogGroup:
    Value: !GetAtt PnDeliveryPushWorkflowLogGroup.Outputs.LogGroupName
