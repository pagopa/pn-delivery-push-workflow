logging.config=classpath:logback-base.xml

pn.env.runtime=PROD
spring.application.name=pn-delivery-push-workflow

pn.delivery-push-workflow.data-vault-base-url=http://alb.confidential.pn.internal:8080

spring.cloud.aws.sqs.enabled=${SQS_INTEGRATION_ENABLED}

pn.middleware.impl.document-creation=dynamo
pn.middleware.impl.failed-notification=dynamo

pn.delivery-push-workflow.external-channel-cx-id=pn-delivery-002
pn.delivery-push-workflow.safe-storage-cx-id=pn-delivery-push
pn.delivery-push-workflow.safe-storage-cx-id-updatemetadata=pn-delivery

pn.delivery-push-workflow.paper-channel.sender-address.fullname=PagoPA S.p.A.
pn.delivery-push-workflow.paper-channel.sender-address.address=Via Sardegna n. 38
pn.delivery-push-workflow.paper-channel.sender-address.zipcode=00187
pn.delivery-push-workflow.paper-channel.sender-address.city=Roma
pn.delivery-push-workflow.paper-channel.sender-address.pr=Roma
pn.delivery-push-workflow.paper-channel.sender-address.country=Italia

pn.delivery-push-workflow.external-channel.digital-codes-progress=C001
pn.delivery-push-workflow.external-channel.digital-codes-retryable=C008,C010,DP10
pn.delivery-push-workflow.external-channel.digital-codes-success=C003,Q003
pn.delivery-push-workflow.external-channel.digital-codes-fail=C002,C004,C006,C009,C011, Q011
# a prescindere dagli esiti, per questi qui si vuole loggare un FATAL per porre l'attenzione all'evento,
# il quale probabilmente richiede un check da parte un operatore
pn.delivery-push-workflow.external-channel.digital-codes-fatallog=C008,C009,C010,Q010,DP10
# Default values
pn.delivery-push-workflow.pn-send-mode=1970-01-01T00:00:00Z;AAR-DOCUMENTS-PAYMENTS;AAR;AAR;AAR_NOTIFICATION,2024-02-13T23:00:00Z;AAR-DOCUMENTS-PAYMENTS;AAR;AAR-DOCUMENTS-PAYMENTS;AAR_NOTIFICATION,2024-03-31T23:00:00Z;AAR;AAR;AAR-DOCUMENTS-PAYMENTS;AAR_NOTIFICATION_RADD
pn.delivery-push-workflow.safe-storage-file-not-found-retry=false
#Feature flag per attivazione invio solo AAR per PEC con copertura RADD e PF
pn.delivery-push-workflow.AAROnlyPECForRADDAndPF=${PN_DELIVERY_PUSH_AARONLYPECFORRADDANDPF}
pn.delivery-push-workflow.templateURLforPEC=${PN_DELIVERY_PUSH_TEMPLATEURLFORPEC:/templates-engine-private/v1/templates/notification-aar-for-pec}