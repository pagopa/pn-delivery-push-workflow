logging.config=config/logback-local.xml

# Runtime mode
pn.env.runtime=DEVELOPMENT
#pn.env.runtime=PROD
spring.cloud.aws.credentials.profile-name=${PN_AWS_PROFILE_NAME:default}
spring.cloud.aws.region.static=us-east-1
spring.cloud.aws.endpoint=http://localhost:4566

# Queue SQS configurations
pn.delivery-push-workflow.topics.from-external-channel=local-ext-channels-outputs
pn.delivery-push-workflow.topics.scheduled-actions=local-delivery-push-actions
pn.delivery-push-workflow.topics.new-notifications=local-delivery-push-inputs.fifo
pn.delivery-push-workflow.topics.nationalRegistriesEvents=local-national-registries-gateway

spring.cloud.aws.sqs.enabled=true

pn.delivery-push-workflow.webapp.quick-access-url-aar-detail-suffix=notifica?aar
pn.delivery-push-workflow.webapp.landing-url=https://www.dev.pn.pagopa.it
pn.delivery-push-workflow.webapp.faq-url-template-suffix=faq
pn.delivery-push-workflow.webapp.faqCompletionMomentHash=perfezionamento-quando
pn.delivery-push-workflow.webapp.faqSendHash=send-cosa-e

pn.delivery-push-workflow.delivery-base-url=http://localhost:8080
pn.delivery-push-workflow.data-vault-base-url=http://localhost:8084
pn.delivery-push-workflow.safe-storage-base-url=http://localhost:8120
pn.delivery-push-workflow.external-channel-base-url=http://localhost:8082
pn.delivery-push-workflow.user-attributes-base-url=http://localhost:8085
pn.delivery-push-workflow.external-registry-base-url=http://localhost:8087
pn.delivery-push-workflow.paper-channel-base-url=http://localhost:8088
pn.delivery-push-workflow.national-registries-base-url=http://localhost:1080
pn.delivery-push-workflow.action-manager-base-url=http://localhost:8090
pn.delivery-push-workflow.templates-engine-base-url=http://localhost:8090
pn.delivery-push-workflow.timeline-client-base-url=http://localhost:8091
# Enables retry of the notification validation in case of SafeStorage 404 error
pn.delivery-push-workflow.safeStorageFileNotFoundRetry=false
pn.delivery-push-workflow.pago-pa-notification-base-cost=100
pn.delivery-push-workflow.pago-pa-notification-fee=100
pn.delivery-push-workflow.pago-pa-notification-vat=22
#Configuration for send notification attachment, AAR, and AAR type. Comma separated list made up by:
# "Configuration start time" (UTC);"Send attachment mode for analog";"Send attachment mode for simple registered letter";"AAR template type"
pn.delivery-push-workflow.paper-send-mode=1970-01-01T00:00:00Z;AAR-DOCUMENTS-PAYMENTS;AAR-DOCUMENTS-PAYMENTS;AAR_NOTIFICATION,2023-11-30T23:00:00Z;AAR;AAR;AAR_NOTIFICATION_RADD
#Configuration for send notification attachment, AAR, and AAR type. Comma separated list made up by:
# "Configuration start time" (UTC);"Send attachment mode for analog";"Send attachment mode for simple registered letter";"Send attachment mode for legal mail";"AAR template type" - if <RADD_TEMPLATE_DEFINITION> is last parameter value ("AAR template type") it means that the AAR template type need to be obtained dynamically, used for RADD experimentation
pn.delivery-push-workflow.pn-send-mode=1970-01-01T00:00:00Z;AAR-DOCUMENTS-PAYMENTS;AAR;AAR;AAR_NOTIFICATION,2024-05-22T22:00:00Z;AAR-DOCUMENTS-PAYMENTS;AAR;AAR-DOCUMENTS-PAYMENTS;AAR_NOTIFICATION,2024-05-22T22:00:00Z;AAR-DOCUMENTS-PAYMENTS;AAR;AAR-DOCUMENTS-PAYMENTS;<RADD_TEMPLATE_DEFINITION>,2024-06-26T22:00:00Z;AAR-DOCUMENTS-PAYMENTS;AAR;AAR-DOCUMENTS-PAYMENTS;AAR_NOTIFICATION_RADD_ALT
pn.delivery-push-workflow.timeline-client-enabled-start-date=2025-06-13T15:13:00Z
#Feature flag per attivazione invio solo AAR per PEC con copertura RADD e PF
pn.delivery-push-workflow.AAROnlyPECForRADDAndPF=${PN_DELIVERY_PUSH_AARONLYPECFORRADDANDPF}
pn.delivery-push-workflow.templateURLforPEC=${PN_DELIVERY_PUSH_TEMPLATEURLFORPEC:/templates-engine-private/v1/templates/notification-aar-for-pec}

