#Configuration for send notification attachment, AAR, and AAR type. Comma separated list made up by:
# "Configuration start time" (UTC);"Send attachment mode for analog";"Send attachment mode for simple registered letter";"Send attachment mode for legal mail";"AAR template type" - if <RADD_TEMPLATE_DEFINITION> is last parameter value ("AAR template type") it means that the AAR template type need to be obtained dynamically, used for RADD experimentation
pn.delivery-push-workflow.pn-send-mode=1970-01-01T00:00:00Z;AAR-DOCUMENTS-PAYMENTS;AAR;AAR;AAR_NOTIFICATION,2024-05-22T22:00:00Z;AAR-DOCUMENTS-PAYMENTS;AAR;AAR-DOCUMENTS-PAYMENTS;AAR_NOTIFICATION,2024-05-22T22:00:00Z;AAR-DOCUMENTS-PAYMENTS;AAR;AAR-DOCUMENTS-PAYMENTS;<RADD_TEMPLATE_DEFINITION>,2024-06-26T22:00:00Z;AAR-DOCUMENTS-PAYMENTS;AAR;AAR-DOCUMENTS-PAYMENTS;AAR_NOTIFICATION_RADD_ALT
pn.delivery-push-workflow.timeline-client-enabled-start-date=2025-06-13T15:13:00Z
