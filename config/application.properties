pn.delivery-push-workflow.time-params.check-attachment-time-before-expiration=10d
# Time to add when attachment retention is expiring
pn.delivery-push-workflow.time-params.attachment-time-to-add-after-expiration=120d

# Config giorni retention degli allegati dopo la data di presa visione o decorrenza termini
pn.delivery-push-workflow.retention-attachment-days-after-refinement=120

